name: Response Time CI
on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:
jobs:
  response-time:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for GH_PAT
        id: check-pat
        run: |
          if [ -z "$GH_PAT" ]; then
            echo "::warning::GH_PAT secret not configured. Skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
          fi
        env:
          GH_PAT: ${{ secrets.GH_PAT }}

      - uses: upptime/uptime-monitor@v1.41.0
        if: steps.check-pat.outputs.skip != 'true'
        with:
          command: response-time
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
